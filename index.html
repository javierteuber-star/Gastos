<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Control Gastos</title>
<style>
  :root{--bg:#0e1420;--card:#171f2e;--card2:#1d2738;--ink:#e8edf5;--muted:#8b97ab;--line:#26324a;--accent:#4fc3f7;--cuota:#ffb74d;--good:#66bb6a;--bad:#ef5350;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--ink);font-family:-apple-system,Helvetica,Arial,sans-serif;padding-bottom:60px;}
  header{padding:24px 20px 16px;border-bottom:1px solid var(--line);}
  h1{font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:12px;}
  .mes-selector{display:flex;gap:8px;align-items:center;}
  .mes-btn{font-size:22px;font-weight:800;color:var(--ink);background:none;border:none;padding:0;cursor:pointer;}
  .mes-btn .chevron{font-size:14px;color:var(--muted);margin-left:3px;}
  .mes-sep{font-size:22px;font-weight:300;color:var(--line);}
  .picker-overlay{position:fixed;inset:0;z-index:100;display:none;}
  .picker-overlay.show{display:block;}
  .picker-box{position:absolute;background:var(--card2);border-radius:14px;box-shadow:0 8px 32px rgba(0,0,0,.5);padding:8px 0;min-width:160px;border:1px solid var(--line);max-height:300px;overflow-y:auto;}
  .picker-item{padding:11px 18px;font-size:15px;font-weight:500;cursor:pointer;color:var(--ink);}
  .picker-item:hover{background:var(--card);}
  .picker-item.activo{font-weight:800;color:var(--accent);}
  main{max-width:480px;margin:0 auto;padding:0 20px;}
  .panel{margin-top:22px;padding:22px;background:var(--card);border:1px solid var(--line);border-radius:14px;}
  .panel h3{font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin:0 0 14px;font-weight:700;}
  .dato-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--line);}
  .dato-row:last-child{border-bottom:none;}
  .dato-row .label{font-size:14px;color:var(--muted);}
  .dato-row .valor{font-size:17px;font-weight:700;}
  .dato-row button.edit{border:none;background:none;color:var(--accent);font-size:13px;font-weight:600;}
  .resultado{text-align:center;padding:6px 0 2px;}
  .resultado .monto{font-size:36px;font-weight:800;line-height:1.1;}
  .resultado .lbl{font-size:12px;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;margin-top:2px;}
  .resultado .sub{font-size:13px;color:var(--muted);margin-top:10px;}
  .barra-bg{height:10px;border-radius:6px;background:var(--card2);overflow:hidden;margin-top:14px;}
  .barra-fill{height:100%;border-radius:6px;}
  .filtros{display:flex;gap:8px;}
  .filtros select{flex:1;border:1px solid var(--line);border-radius:10px;padding:9px 12px;font-size:14px;background:var(--card2);color:var(--ink);}
  /* Tabla de categorías 4 columnas */
  .cat-table{margin-top:16px;border:1px solid var(--line);border-radius:10px;overflow:hidden;font-size:12px;}
  .cat-trow{display:grid;grid-template-columns:1.35fr .95fr .95fr 1.2fr;padding:9px 10px;border-bottom:1px solid var(--line);align-items:center;cursor:pointer;}
  .cat-trow:last-child{border-bottom:none;}
  .cat-trow.header{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.4px;cursor:default;background:var(--card2);font-weight:700;}
  .cat-trow .num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap;}
  .cat-trow .tot{font-weight:700;}
  .cat-trow .cnom{display:flex;align-items:center;gap:6px;min-width:0;}
  .cat-trow .cnom span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .cat-trow.selected{background:rgba(79,195,247,.12);box-shadow:inset 3px 0 0 var(--accent);}
  .cat-trow.selected .cnom span{font-weight:700;}
  .cat-trow.subtotal{background:var(--card2);font-weight:700;border-top:2px solid var(--line);cursor:default;}
  .cat-cuota-col{color:var(--cuota);}
  .nota-cuotas{font-size:11px;color:var(--muted);margin-top:8px;line-height:1.4;}
  .flag{font-size:10px;font-weight:800;margin-left:5px;}
  .flag.up{color:var(--bad);}
  .flag.down{color:var(--good);}
  .flag.flat{color:var(--muted);font-weight:600;}
  .fut-barras{display:flex;align-items:flex-end;gap:8px;height:120px;margin-bottom:4px;}
  .fut-col{flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;gap:4px;height:100%;cursor:pointer;}
  .fut-monto{font-size:9.5px;color:var(--cuota);font-weight:700;font-variant-numeric:tabular-nums;}
  .fut-bar{width:100%;background:linear-gradient(180deg,rgba(255,183,77,.55),rgba(255,183,77,.25));border-radius:5px 5px 0 0;border:1px solid transparent;}
  .fut-bar.sel{background:linear-gradient(180deg,rgba(255,183,77,.95),rgba(255,183,77,.55));border-color:var(--cuota);}
  .fut-mes{font-size:10px;color:var(--muted);margin-top:2px;}
  .fut-anio{font-size:9px;color:var(--muted);opacity:.7;}
  .fut-nota{font-size:11px;color:var(--muted);margin-top:8px;line-height:1.5;}
  .fut-lista{margin-top:12px;border-top:1px solid var(--line);padding-top:10px;}
  .fut-item{display:flex;justify-content:space-between;gap:10px;font-size:12px;padding:6px 0;color:var(--muted);}
  .fut-item b{color:var(--ink);font-weight:600;}
  .fut-item .m{color:var(--cuota);font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap;}
  .punto{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
  .lista{list-style:none;padding:0;margin-top:4px;}
  .lista li{display:flex;justify-content:space-between;align-items:center;padding:13px 0 13px 8px;border-bottom:1px solid var(--line);font-size:15px;}
  .lista li:last-child{border-bottom:none;}
  .lista li.es-cuota{box-shadow:inset 3px 0 0 var(--cuota);}
  .lista li.es-cuota .monto{color:var(--cuota);}
  .desc{flex:1;padding-right:10px;min-width:0;}
  .cat-tag{font-size:11px;color:var(--muted);display:block;margin-top:2px;font-style:italic;}
  .badge-cuota{display:inline-block;font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px;margin-left:6px;vertical-align:1px;background:rgba(255,183,77,.15);color:var(--cuota);border:1px solid rgba(255,183,77,.4);font-style:normal;}
  .monto{font-weight:700;white-space:nowrap;}
  .det-sub{display:flex;justify-content:space-between;padding:12px 10px;background:var(--card2);font-size:13px;font-weight:700;border-top:2px solid var(--line);border-radius:0 0 10px 10px;margin-top:2px;}
  .vacio{text-align:center;color:var(--muted);font-size:14px;padding:14px 0;}
  .hist-row{display:flex;justify-content:space-between;font-size:12px;padding:5px 0;border-bottom:1px solid var(--line);color:var(--muted);}
  .hist-row span:last-child{font-weight:600;color:var(--ink);}
  .form-agregar{display:flex;flex-wrap:wrap;gap:8px;}
  .form-agregar input,.form-agregar select{border:1px solid var(--line);border-radius:10px;padding:12px 14px;font-size:16px;background:var(--card2);color:var(--ink);}
  .form-agregar input::placeholder{color:var(--muted);}
  .form-agregar input[type=number]{flex:1;min-width:100px;}
  .form-agregar select{flex:1.2;min-width:130px;}
  .form-agregar input[type=text]{flex:1.2;min-width:130px;}
  .form-agregar input[type=date]{color-scheme:dark;}
  .form-agregar button.submit{width:100%;border:none;background:var(--accent);color:#0e1420;border-radius:10px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;}
  .btn-foto{width:100%;border:2px dashed var(--line);background:none;border-radius:10px;padding:11px;font-size:14px;color:var(--muted);margin-bottom:12px;font-weight:600;cursor:pointer;}
  #fotoStatus{font-size:13px;color:var(--muted);text-align:center;min-height:18px;margin-bottom:8px;}
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;padding:20px;z-index:200;}
  .modal-bg.show{display:flex;}
  .modal{background:var(--card2);border:1px solid var(--line);border-radius:14px;padding:22px;width:100%;max-width:340px;}
  .modal h2{font-size:16px;margin:0 0 14px;}
  .modal input{width:100%;border:1px solid var(--line);border-radius:10px;padding:12px 14px;font-size:16px;margin-bottom:14px;background:var(--card);color:var(--ink);}
  .modal .botones{display:flex;gap:8px;}
  .modal .botones button{flex:1;border:none;border-radius:10px;padding:12px;font-size:15px;font-weight:600;cursor:pointer;}
  .modal .cancelar{background:var(--card);color:var(--ink);border:1px solid var(--line);}
  .modal .guardar{background:var(--accent);color:#0e1420;}
  .status-bar{position:fixed;bottom:0;left:0;right:0;background:var(--card2);border-top:1px solid var(--line);padding:10px 20px;font-size:13px;color:var(--muted);text-align:center;display:none;}
  .status-bar.show{display:block;}
  .status-bar.error{color:var(--bad);}
  .status-bar.ok{color:var(--good);}
  .inicio-overlay{position:fixed;inset:0;background:var(--bg);z-index:300;display:flex;align-items:center;justify-content:center;padding:24px;}
  .inicio-box{width:100%;max-width:340px;text-align:center;}
  .inicio-box h2{font-size:14px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:22px;}
  .anio-nav{display:flex;align-items:center;justify-content:center;gap:26px;margin-bottom:20px;}
  .anio-nav button{background:none;border:none;color:var(--accent);font-size:26px;font-weight:700;cursor:pointer;padding:4px 10px;}
  .anio-nav .anio-num{font-size:26px;font-weight:800;min-width:90px;}
  .meses-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  .meses-grid button{background:var(--card);border:1px solid var(--line);border-radius:12px;color:var(--ink);padding:15px 0;font-size:14px;font-weight:600;cursor:pointer;}
  .meses-grid button.actual{background:rgba(79,195,247,.15);border-color:var(--accent);color:var(--accent);}
</style>
</head>
<body>
<header>
  <h1>Control de Gastos</h1>
  <div class="mes-selector">
    <button class="mes-btn" id="btnMes">Julio <span class="chevron">▾</span></button>
    <span class="mes-sep">/</span>
    <button class="mes-btn" id="btnAnio">2026 <span class="chevron">▾</span></button>
  </div>
  <div class="picker-overlay" id="overlayMes"><div class="picker-box" id="pickerMes"></div></div>
  <div class="picker-overlay" id="overlayAnio"><div class="picker-box" id="pickerAnio"></div></div>
</header>
<main>
  <div class="panel" id="panelResumen"><div class="vacio">Conectando...</div></div>
  <div class="panel" id="panelFue"></div>
  <div class="panel">
    <h3>Gastos por categoría</h3>
    <div class="filtros">
      <select id="filtroOrigen"><option value="">Todos los orígenes</option></select>
      <select id="filtroCat"><option value="">Todas las categorías</option></select>
    </div>
    <div id="breakdownCat"></div>
  </div>
  <div class="panel">
    <h3>Tendencia por categoría</h3>
    <canvas id="chart" height="220" style="cursor:pointer"></canvas>
    <div id="resumenHist"></div>
  </div>
  <div class="panel" id="panelFuturo"><div class="vacio">Cargando...</div></div>
  <div class="panel">
    <h3>Agregar Input</h3>
    <button class="btn-foto" id="btnFoto">📷 Cargar desde foto</button>
    <input type="file" id="fotoInput" accept="image/*" style="display:none">
    <div id="fotoStatus"></div>
    <div class="form-agregar">
      <select id="tipoInput" style="width:100%"><option value="gasto">Gasto</option><option value="abono">Abono / reverso</option></select>
      <input type="number" id="montoInput" placeholder="$" inputmode="numeric">
      <select id="catInput"><option value="Almuerzo">Almuerzo</option><option value="Auto">Auto</option><option value="Bienestar">Bienestar</option><option value="Casa">Casa</option><option value="Comida - Casa">Comida - Casa</option><option value="Cuidadora">Cuidadora</option><option value="Cuota Auto">Cuota Auto</option><option value="Estacionamiento">Estacionamiento</option><option value="Farmacia">Farmacia</option><option value="Financieros">Financieros</option><option value="Fondo Reserva">Fondo Reserva</option><option value="Gasto Comun">Gasto Comun</option><option value="Giro Cajero">Giro Cajero</option><option value="Luna de miel">Luna de miel</option><option value="Matrimonio">Matrimonio</option><option value="Movistar">Movistar</option><option value="Nana">Nana</option><option value="Ocio">Ocio</option><option value="Otros">Otros</option><option value="Pedir Comida">Pedir Comida</option><option value="Perros">Perros</option><option value="Regalos">Regalos</option><option value="Ropa">Ropa</option><option value="Seguro Auto">Seguro Auto</option><option value="Sueldo">Sueldo</option><option value="Taxi">Taxi</option><option value="Unicef">Unicef</option><option value="Viajes">Viajes</option></select>
      <select id="origenInput"><option value="TC Santander">TC Santander</option><option value="TC CMR">TC CMR</option><option value="TC Cencosud">TC Cencosud</option><option value="Manuales">Manuales</option></select>
      <input type="text" id="comentarioInput" placeholder="Comentario (opcional)" maxlength="80">
      <input type="date" id="fechaInput">
      <input type="number" id="cuotasInput" min="1" max="48" placeholder="Nro Cuotas" onfocus="if(!this.value)this.value=1">
      <button class="submit" id="btnAgregar">Agregar Input</button>
    </div>
  </div>
  <div class="panel" id="panelMov"><div class="vacio">Conectando...</div></div>
</main>
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h2 id="modalTitulo">Editar</h2>
    <input type="number" id="modalInput" inputmode="numeric">
    <div class="botones">
      <button class="cancelar" id="btnCancelar">Cancelar</button>
      <button class="guardar" id="btnGuardar">Guardar</button>
    </div>
  </div>
</div>
<div class="inicio-overlay" id="inicioOverlay">
  <div class="inicio-box">
    <h2>¿Qué mes quieres ver?</h2>
    <div class="anio-nav">
      <button id="inicioAnioPrev">‹</button>
      <span class="anio-num" id="inicioAnioNum"></span>
      <button id="inicioAnioNext">›</button>
    </div>
    <div class="meses-grid" id="inicioMeses"></div>
  </div>
</div>
<div class="status-bar" id="statusBar"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyK-K2SkRG3soQeC3vxxwgg6GQj7H9kJJXBLdusCWeDLbfzBv1wvPxek9NitaZeYrD4EQ/exec";
const MESES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const PALETA = {
  "TC Santander":"#e08a4f","TC CMR":"#6fae85","TC Cencosud":"#7d9cc0",
  "TC Chile Nacional":"#c07bb0","TC Chile Internacional":"#d9bb50","Manuales":"#9a82d0",
  "Arriendo":"#b07050","Comida - Casa":"#6fae85","Auto":"#7d9cc0","Nana":"#c07bb0",
  "Pedir Comida":"#d9bb50","Almuerzo":"#9a82d0","Ocio":"#6cb0a0","Farmacia":"#d3735e",
  "Gasto Comun":"#8ba0d5","Regalos":"#bc9a6a","Taxi":"#7fc3c3","Viajes":"#5aaa8a",
  "Bienestar":"#c078b8","Movistar":"#75a8ca","Otros":"#9a9a9a","Casa":"#e09a5a",
  "Ropa":"#9a82d0","Cuota Auto":"#6a9ab9","Seguro Auto":"#5a8aa9",
  "Estacionamiento":"#8aaab9","Cuidadora":"#d37bc0","Fondo Reserva":"#4a9a7a",
  "Giro Cajero":"#ba9a7a","Unicef":"#5a7aba","Perros":"#aa9a5a",
  "Financieros":"#7b8b9a","Matrimonio":"#e9c2a7","Luna de miel":"#f9d2b7"
};
var TODAS_CATS = ["Almuerzo", "Arriendo", "Auto", "Bienestar", "Casa", "Comida - Casa", "Cuidadora", "Cuota Auto", "Estacionamiento", "Farmacia", "Financieros", "Fondo Reserva", "Gasto Comun", "Giro Cajero", "Luna de miel", "Matrimonio", "Movistar", "Nana", "Ocio", "Otros", "Pedir Comida", "Perros", "Regalos", "Ropa", "Seguro Auto", "Sueldo", "Taxi", "Unicef", "Viajes"];
function color(k){ return PALETA[k]||"#9a9a9a"; }
function fmt(n){ return (n<0?"-":"")+"$"+Math.abs(Math.round(n)).toLocaleString("es-CL"); }

var _hoy=new Date();
var mesActual=_hoy.getMonth()+1, anioActual=_hoy.getFullYear();
var datosMes={ingreso:0,meta:0,saldoInicial:0,ahorro:0,gastoTotal:0,totales:{},gastos:[],cuotas:[]};
var cache={};
var filtroCatVal="", filtroOrigenVal="";
var chart=null, modalTipo=null;
var cuotasOk=false;

function status(msg,tipo){
  var bar=document.getElementById("statusBar");
  bar.textContent=msg; bar.className="status-bar show "+(tipo||"");
  if(tipo==="ok"||tipo==="error") setTimeout(function(){bar.className="status-bar";},3000);
}

async function api(params){
  params.token="javi2026gastos"; var qs=Object.entries(params).map(function(e){return encodeURIComponent(e[0])+"="+encodeURIComponent(e[1]);}).join("&");
  var r=await fetch(SCRIPT_URL+"?"+qs);
  return await r.json();
}

async function apiPost(body){
  body.token="javi2026gastos"; var r=await fetch(SCRIPT_URL,{method:"POST",body:JSON.stringify(body)});
  return await r.json();
}

// Selectores mes/año
function actualizarBtns(){
  document.getElementById("btnMes").innerHTML=MESES[mesActual-1]+' <span class="chevron">▾</span>';
  document.getElementById("btnAnio").innerHTML=anioActual+' <span class="chevron">▾</span>';
}
function abrirPicker(tipo){
  var overlay=document.getElementById(tipo==="mes"?"overlayMes":"overlayAnio");
  var box=document.getElementById(tipo==="mes"?"pickerMes":"pickerAnio");
  var btn=document.getElementById(tipo==="mes"?"btnMes":"btnAnio");
  var rect=btn.getBoundingClientRect();
  box.style.top=(rect.bottom+6)+"px"; box.style.left=rect.left+"px";
  box.innerHTML="";
  if(tipo==="mes"){
    MESES.forEach(function(m,i){
      var d=document.createElement("div"); d.className="picker-item"+(mesActual===i+1?" activo":"");
      d.textContent=m;
      d.onclick=function(){ mesActual=i+1; filtroCatVal=""; filtroOrigenVal=""; actualizarBtns(); overlay.classList.remove("show"); cargarMes(); };
      box.appendChild(d);
    });
  } else {
    [2022,2023,2024,2025,2026,2027].forEach(function(y){
      var d=document.createElement("div"); d.className="picker-item"+(anioActual===y?" activo":"");
      d.textContent=y;
      d.onclick=function(){ anioActual=y; filtroCatVal=""; filtroOrigenVal=""; actualizarBtns(); overlay.classList.remove("show"); cargarMes(); };
      box.appendChild(d);
    });
  }
  overlay.classList.add("show");
}
document.getElementById("btnMes").addEventListener("click",function(e){ e.stopPropagation(); abrirPicker("mes"); });
document.getElementById("btnAnio").addEventListener("click",function(e){ e.stopPropagation(); abrirPicker("anio"); });
document.getElementById("overlayMes").addEventListener("click",function(){ this.classList.remove("show"); });
document.getElementById("overlayAnio").addEventListener("click",function(){ this.classList.remove("show"); });

async function precargarTendencia(){
  var mesesArray=[];
  for(var i=11;i>=0;i--){
    var d=new Date(anioActual,mesActual-1-i,1);
    mesesArray.push({mes:MESES[d.getMonth()],anio:d.getFullYear()});
  }
  try{
    // Cargar resumen múltiple + pagos (gastos y cuotas) de los 12 meses en 2 llamadas
    var promesas=[
      api({action:"getResumenMultiple",meses:JSON.stringify(mesesArray)}),
      api({action:"getPagosMultiple",meses:JSON.stringify(mesesArray)})
    ];
    var resultados=await Promise.all(promesas);
    var resResp=resultados[0];
    if(resResp.ok && resResp.data){
      Object.entries(resResp.data).forEach(function(entry){
        var clave=entry[0]; var r=entry[1];
        function n(k){ var v=r[k]; if(typeof v==="number") return Math.abs(v); if(!v||v==="") return 0; return Math.abs(parseFloat(String(v).replace(/[$. ]/g,"").replace(",","."))||0); }
        function nSigned(k){ var v=r[k]; if(typeof v==="number") return v; if(!v||v==="") return 0; return parseFloat(String(v).replace(/[$. ]/g,"").replace(",","."))||0; }
        if(!cache[clave]){
          cache[clave]={
            ingreso:n("Ingreso"),meta:0,saldoInicial:0,
            ahorro:nSigned("Ahorro"),gastoTotal:n("Total Gastos"),
            totales:{"TC Santander":n("TC Santander"),"TC CMR":n("TC CMR"),"TC Cencosud":n("TC Cencosud"),"TC Chile Nacional":n("TC Chile Nacional"),"TC Chile Internacional":n("TC Chile Internacional"),"CC Chile":nSigned("CC Chile"),"Manuales":n("Manuales"),"Arriendo":n("Arriendo")},
            gastos:[]
          };
        }
      });
    }
    // Asignar pagos (gastos + cuotas) a cada mes
    var pagosResp=resultados[1];
    if(pagosResp&&pagosResp.ok&&pagosResp.data){
      Object.entries(pagosResp.data).forEach(function(entry){
        var clave=entry[0]; var pagos=entry[1]||[];
        if(!cache[clave]) return;
        cache[clave].gastos=pagos.filter(function(p){return (p.cuotaNum||1)<=1;});
        cache[clave].cuotas=pagos.filter(function(p){return (p.cuotaNum||1)>=2;});
        // Agregar Arriendo sintetico
        if(cache[clave].totales["Arriendo"]>0){
          cache[clave].gastos.push({monto:cache[clave].totales["Arriendo"],categoria:"Arriendo",origen:"Arriendo",comentario:"",fecha:clave+"-01T00:00:00.000Z"});
        }
      });
    }
    renderChart();
  }catch(err){ console.log("Error precargando:",err); }
}

async function cargarMes(){
  status("Cargando...");
  document.getElementById("panelResumen").innerHTML='<div class="vacio">Cargando...</div>';
  document.getElementById("panelMov").innerHTML='<div class="vacio">Cargando...</div>';
  try{
    var mes=MESES[mesActual-1];
    var resResp=await api({action:"getResumen",mes:mes,anio:anioActual});
    var movResp=await api({action:"getMovimientos",mes:mes,anio:anioActual});
    if(!resResp.ok) throw new Error(resResp.error||"Error en Resumen");
    if(!movResp.ok) throw new Error(movResp.error||"Error en Movimientos");
    // Cuotas de meses anteriores que caen en este mes (requiere Apps Script actualizado)
    var cuotasData=[]; cuotasOk=false;
    try{
      var cuoResp=await api({action:"getCuotas",mes:mes,anio:anioActual});
      if(cuoResp&&cuoResp.ok&&Array.isArray(cuoResp.data)){ cuotasData=cuoResp.data; cuotasOk=true; }
    }catch(e){ console.log("getCuotas no disponible aún:",e); }
    var r=resResp.data||{};
    function n(k){ var v=r[k]; if(typeof v === "number") return Math.abs(v); if(!v||v==="") return 0; return Math.abs(parseFloat(String(v).replace(/[$. ]/g,"").replace(",","."))||0); }
    function nSigned(k){ var v=r[k]; if(typeof v === "number") return v; if(!v||v==="") return 0; return parseFloat(String(v).replace(/[$. ]/g,"").replace(",","."))||0; }
    var claveMes=anioActual+"-"+String(mesActual).padStart(2,"0");
    var ingresoLocal=parseFloat(localStorage.getItem("ingreso:"+claveMes))||0;
    var metaLocal=parseFloat(localStorage.getItem("meta:"+claveMes))||0;
    var saldoLocal=parseFloat(localStorage.getItem("saldo:"+claveMes))||0;
    var ingresoFinal=ingresoLocal||n("Ingreso");
    var gastoFinal=n("Total Gastos");
    var ahorro=nSigned("Ahorro")||0;
    if(ingresoLocal) ahorro=ingresoLocal-gastoFinal;
    datosMes={
      ingreso:ingresoFinal, meta:metaLocal, saldoInicial:saldoLocal,
      ahorro:ahorro, gastoTotal:gastoFinal,
      totales:{
        "TC Santander":n("TC Santander"),"TC CMR":n("TC CMR"),"TC Cencosud":n("TC Cencosud"),
        "TC Chile Nacional":n("TC Chile Nacional"),"TC Chile Internacional":n("TC Chile Internacional"),
        "CC Chile":nSigned("CC Chile"),"Manuales":n("Manuales"),"Arriendo":n("Arriendo")
      },
      gastos:movResp.data||[],
      cuotas:cuotasData.map(function(c){
        return {
          monto:Math.abs(c.monto||0),
          montoTotal:Math.abs(c.montoTotal||0),
          cuotas:c.cuotas||0,
          cuotaNum:c.cuotaNum||0,
          categoria:c.categoria||"Otros",
          origen:c.origen||"",
          comentario:c.comentario||"",
          fechaCompra:c.fechaCompra||""
        };
      })
    };
    // Agregar Arriendo sintético
    if(datosMes.totales["Arriendo"]>0){
      datosMes.gastos.push({monto:datosMes.totales["Arriendo"],categoria:"Arriendo",origen:"Arriendo",comentario:"",fecha:anioActual+"-"+String(mesActual).padStart(2,"0")+"-01T00:00:00.000Z"});
      datosMes.gastos.sort(function(a,b){return b.fecha.localeCompare(a.fecha);});
    }
    cache[anioActual+"-"+String(mesActual).padStart(2,"0")]=JSON.parse(JSON.stringify(datosMes));
    render();
    cargarFuturos();
    status("","");
  }catch(err){
    console.error(err);
    status("❌ Error: "+err.message,"error");
    document.getElementById("panelResumen").innerHTML='<div class="vacio">Error cargando datos. Revisa tu conexión.</div>';
  }
}

function fechaCorta(iso){
  var f=new Date(iso);
  if(isNaN(f)) return "";
  return f.getDate()+" "+MESES[f.getMonth()].slice(0,3)+" "+f.getFullYear().toString().slice(2);
}

function fmtM(n){ return "$"+Math.round(n/1000).toLocaleString("es-CL")+"M"; }

var futuros={}, futSel="";
var CATS_FIJAS=["gasto comun","cuidadora","nana","seguro auto","fondo reserva"];
async function cargarFuturos(){
  var mesesFut=[];
  for(var i=1;i<=6;i++){
    var d=new Date(anioActual,mesActual-1+i,1);
    mesesFut.push({mes:MESES[d.getMonth()],anio:d.getFullYear()});
  }
  futuros={}; futSel="";
  try{
    var r=await api({action:"getPagosMultiple",meses:JSON.stringify(mesesFut)});
    if(r&&r.ok&&r.data){
      Object.entries(r.data).forEach(function(entry){
        // Solo deuda pactada en cuotas: fuera gastos fijos recurrentes
        futuros[entry[0]]=(entry[1]||[]).filter(function(p){
          return CATS_FIJAS.indexOf(String(p.categoria||"").trim().toLowerCase())===-1;
        });
      });
    }
  }catch(e){ console.log("Error cargando futuros:",e); }
  renderFuturo();
}

function renderFuturo(){
  var el=document.getElementById("panelFuturo");
  var claves=Object.keys(futuros).sort();
  var conDatos=claves.filter(function(c){return (futuros[c]||[]).length>0;});
  var h='<h3>Compromisos futuros en cuotas</h3>';
  if(conDatos.length===0){
    el.innerHTML=h+'<div class="vacio">Sin cuotas comprometidas en los próximos 6 meses 🎉</div>';
    return;
  }
  var tot={}; var max=0;
  claves.forEach(function(c){
    var s=(futuros[c]||[]).reduce(function(a,p){return a+p.monto;},0);
    tot[c]=s; if(s>max)max=s;
  });
  if(!futSel||claves.indexOf(futSel)===-1) futSel=claves[0];
  h+='<div class="fut-barras">';
  claves.forEach(function(c){
    var p=c.split("-"); var mIdx=parseInt(p[1])-1;
    var alt=max>0?Math.max(4,Math.round(tot[c]/max*100)):4;
    h+='<div class="fut-col" data-fut="'+c+'">'+
      '<span class="fut-monto">'+fmtM(tot[c])+'</span>'+
      '<div class="fut-bar'+(futSel===c?" sel":"")+'" style="height:'+alt+'%"></div>'+
      '<span class="fut-mes">'+MESES[mIdx].slice(0,3)+'</span>'+
      '<span class="fut-anio">'+p[0]+'</span></div>';
  });
  h+='</div><div class="fut-nota">Plata ya comprometida en cuotas de compras pasadas. Toca una barra para ver su detalle.</div>';
  var lista=(futuros[futSel]||[]).slice().sort(function(a,b){return b.monto-a.monto;});
  var ps=futSel.split("-");
  h+='<div class="fut-lista">';
  h+='<div class="fut-item"><span><b>'+MESES[parseInt(ps[1])-1]+' '+ps[0]+'</b> · '+lista.length+' pago'+(lista.length===1?"":"s")+'</span><span class="m">'+fmt(tot[futSel]||0)+'</span></div>';
  lista.slice(0,40).forEach(function(p){
    var nom=(p.comentario||p.categoria).slice(0,34);
    var cu=(p.cuotas&&p.cuotas>1)?(" — cuota "+p.cuotaNum+" de "+p.cuotas):"";
    h+='<div class="fut-item"><span>'+nom+cu+'</span><span class="m">'+fmt(p.monto)+'</span></div>';
  });
  if(lista.length>40) h+='<div class="fut-item"><span>... y '+(lista.length-40)+' más</span></div>';
  h+='</div>';
  el.innerHTML=h;
}
document.getElementById("panelFuturo").addEventListener("click",function(e){
  var col=e.target.closest("[data-fut]");
  if(!col) return;
  futSel=col.getAttribute("data-fut");
  renderFuturo();
});

function render(){
  var d=datosMes;
  var gastoTotal=d.gastoTotal||0;
  var ahorroReal=d.ahorro||0;
  var meta=d.meta||0;
  var pct=meta>0?Math.min(100,Math.max(0,Math.round((ahorroReal/meta)*100))):0;
  var barColor=ahorroReal>=meta?"var(--good)":ahorroReal>=0?"var(--accent)":"var(--bad)";

  var rh="";
  rh+='<div class="dato-row"><span class="label">Ingreso del mes</span><span class="valor">'+fmt(d.ingreso)+'</span><button class="edit" data-modal="ingreso">Editar</button></div>';
  rh+='<div class="dato-row"><span class="label">Meta de ahorro</span><span class="valor">'+fmt(meta)+'</span><button class="edit" data-modal="meta">Editar</button></div>';
  if((d.saldoInicial||0)>0) rh+='<div class="dato-row"><span class="label">Ya gastado (no detallado)</span><span class="valor">'+fmt(d.saldoInicial)+'</span><button class="edit" data-modal="saldo">Editar</button></div>';
  rh+='<div class="dato-row"><span class="label">Gasto total</span><span class="valor">'+fmt(gastoTotal)+'</span></div>';
  document.getElementById("panelResumen").innerHTML=rh;

  var diff=ahorroReal-meta;
  var sub=meta>0?(diff>=0?"Superaste tu meta por "+fmt(diff):"Te faltaron "+fmt(Math.abs(diff))+" para tu meta"):"Define una meta de ahorro para comparar";
  document.getElementById("panelFue").innerHTML=
    '<h3>Cómo te fue</h3><div class="resultado">'+
    '<div class="monto" style="color:'+(ahorroReal<0?"var(--bad)":"var(--ink)")+'">'+fmt(ahorroReal)+'</div>'+
    '<div class="lbl">ahorro real este mes</div><div class="sub">'+sub+'</div></div>'+
    '<div class="barra-bg"><div class="barra-fill" style="width:'+pct+'%;background:'+barColor+'"></div></div>';

  var origenes=[...new Set(d.gastos.concat(d.cuotas||[]).map(function(g){return g.origen;}).filter(Boolean))].sort();
  var gastosFiltOrigen=filtroOrigenVal?d.gastos.filter(function(g){return g.origen===filtroOrigenVal;}):d.gastos;
  var cuotasFiltOrigen=filtroOrigenVal?(d.cuotas||[]).filter(function(c){return c.origen===filtroOrigenVal;}):(d.cuotas||[]);

  var filtroOr=document.getElementById("filtroOrigen");
  filtroOr.innerHTML="<option value=''>Todos los orígenes</option>";
  origenes.forEach(function(o){ var op=document.createElement("option"); op.value=o; op.textContent=o; if(filtroOrigenVal===o) op.selected=true; filtroOr.appendChild(op); });

  var filtroCa=document.getElementById("filtroCat");
  filtroCa.innerHTML="<option value=''>Todas las categorías</option>";
  TODAS_CATS.forEach(function(c){ var op=document.createElement("option"); op.value=c; op.textContent=c; if(filtroCatVal===c) op.selected=true; filtroCa.appendChild(op); });

  // Tabla de categorías: Del mes | Cuotas anteriores | Total, ordenada por total desc
  var porCat={};
  gastosFiltOrigen.forEach(function(g){
    if(!porCat[g.categoria]) porCat[g.categoria]={mes:0,cuotas:0};
    porCat[g.categoria].mes+=g.monto;
  });
  cuotasFiltOrigen.forEach(function(c){
    if(!porCat[c.categoria]) porCat[c.categoria]={mes:0,cuotas:0};
    porCat[c.categoria].cuotas+=c.monto;
  });
  var entCat=Object.entries(porCat).map(function(e){
    return {cat:e[0],mes:e[1].mes,cuotas:e[1].cuotas,total:e[1].mes+e[1].cuotas};
  }).sort(function(a,b){return b.total-a.total;});
  var breakdown=document.getElementById("breakdownCat");
  if(entCat.length===0){
    breakdown.innerHTML='<div class="vacio">Sin gastos este mes.</div>';
  } else {
    // Promedio de los últimos 6 meses previos para señal de anomalía
    var claveAct=anioActual+"-"+String(mesActual).padStart(2,"0");
    var prev6=Object.keys(cache).filter(function(c){return c<claveAct;}).sort().slice(-6);
    var sumCatMes=function(mc,cat){
      return ((mc||{}).gastos||[]).concat((mc||{}).cuotas||[]).filter(function(g){
        return g.categoria===cat&&(!filtroOrigenVal||g.origen===filtroOrigenVal);
      }).reduce(function(a,g){return a+g.monto;},0);
    };
    var flagDe=function(e){
      if(prev6.length<3) return "";
      var suma=0; prev6.forEach(function(c){ suma+=sumCatMes(cache[c],e.cat); });
      var avg=suma/prev6.length;
      if(avg<1000) return "";
      var d=(e.total-avg)/avg;
      var pct=Math.min(999,Math.round(Math.abs(d)*100));
      if(d>0.10) return '<span class="flag up">▲'+pct+'%</span>';
      if(d<-0.10) return '<span class="flag down">▼'+pct+'%</span>';
      return '<span class="flag flat">≈</span>';
    };
    var totMes=0,totCuo=0;
    var bh='<div class="cat-table">';
    bh+='<div class="cat-trow header"><div>Categoría</div><div class="num">Del mes</div><div class="num">Cuotas ant.</div><div class="num">Total</div></div>';
    entCat.forEach(function(e){
      totMes+=e.mes; totCuo+=e.cuotas;
      var activo=filtroCatVal===e.cat;
      bh+='<div class="cat-trow'+(activo?" selected":"")+'" data-cat="'+e.cat+'">'+
        '<div class="cnom"><div class="punto" style="background:'+color(e.cat)+'"></div><span>'+e.cat+'</span></div>'+
        '<div class="num">'+fmt(e.mes)+'</div>'+
        '<div class="num'+(e.cuotas>0?" cat-cuota-col":"")+'">'+fmt(e.cuotas)+'</div>'+
        '<div class="num tot">'+fmt(e.total)+flagDe(e)+'</div></div>';
    });
    bh+='<div class="cat-trow subtotal"><div>Total</div><div class="num">'+fmt(totMes)+'</div><div class="num'+(totCuo>0?" cat-cuota-col":"")+'">'+fmt(totCuo)+'</div><div class="num tot">'+fmt(totMes+totCuo)+'</div></div>';
    bh+='</div>';
    if(prev6.length>=3) bh+='<div class="nota-cuotas"><span style="color:var(--bad);font-weight:700">▲</span> sobre tu promedio de los últimos '+prev6.length+' meses · <span style="color:var(--good);font-weight:700">▼</span> bajo el promedio · ≈ normal (±10%)</div>';
    if(!cuotasOk) bh+='<div class="nota-cuotas">⚠️ Cuotas de meses anteriores no disponibles: falta actualizar el Apps Script (acción getCuotas).</div>';
    breakdown.innerHTML=bh;
  }

  // Detalle de movimientos: gastos del mes + cuotas vigentes
  var gastosMov=gastosFiltOrigen.filter(function(g){ return !filtroCatVal||g.categoria===filtroCatVal; });
  var cuotasMov=cuotasFiltOrigen.filter(function(c){ return !filtroCatVal||c.categoria===filtroCatVal; });
  var totalItems=d.gastos.length+(d.cuotas||[]).length;
  var mh="<h3>Movimientos ("+(gastosMov.length+cuotasMov.length)+" de "+totalItems+")</h3>";
  if(gastosMov.length===0&&cuotasMov.length===0){ mh+='<div class="vacio">Sin movimientos.</div>'; }
  else{
    mh+="<ul class='lista'>";
    gastosMov.slice(0,60).forEach(function(g){
      var fs=fechaCorta(g.fecha);
      var coment=g.comentario?(" · "+g.comentario.slice(0,40)):"";
      var badge=(g.cuotas&&g.cuotas>1)?'<span class="badge-cuota">cuota 1 de '+g.cuotas+'</span>':"";
      mh+="<li><div class='desc'>"+g.categoria+badge+"<span class='cat-tag'>"+fs+" · "+g.origen+coment+"</span></div><div class='monto'>"+fmt(g.monto)+"</div></li>";
    });
    if(gastosMov.length>60) mh+="<li style='color:var(--muted);font-size:13px;justify-content:center;'>... y "+(gastosMov.length-60)+" más</li>";
    cuotasMov.forEach(function(c){
      var fs=fechaCorta(c.fechaCompra);
      var coment=c.comentario?c.comentario.slice(0,40):c.categoria;
      var metaTxt="Compra: "+fs+(c.montoTotal?" · Total "+fmt(c.montoTotal):"")+(c.origen?" · "+c.origen:"");
      mh+="<li class='es-cuota'><div class='desc'>"+coment+'<span class="badge-cuota">cuota '+c.cuotaNum+" de "+c.cuotas+"</span><span class='cat-tag'>"+metaTxt+"</span></div><div class='monto'>"+fmt(c.monto)+"</div></li>";
    });
    mh+="</ul>";
    if(filtroCatVal){
      var subDet=gastosMov.reduce(function(a,g){return a+g.monto;},0)+cuotasMov.reduce(function(a,c){return a+c.monto;},0);
      mh+='<div class="det-sub"><div>Subtotal '+filtroCatVal+'</div><div>'+fmt(subDet)+'</div></div>';
    }
  }
  document.getElementById("panelMov").innerHTML=mh;
  renderChart();
}

function renderChart(){
  var claves=Object.keys(cache).sort().slice(-12);
  var labels=claves.map(function(c){ var p=c.split("-"); return MESES[parseInt(p[1])-1].slice(0,3)+" "+p[0].slice(2); });
  var datasets=[{
    label:"Total Gastos",
    data:claves.map(function(c){ return (cache[c]||{}).gastoTotal||0; }),
    borderColor:"#e8edf5",backgroundColor:"#e8edf5",tension:0.3,pointRadius:3,borderWidth:2,fill:false
  }];
  if(filtroCatVal){
    var sumaCatMes=function(mc){
      return ((mc||{}).gastos||[]).concat((mc||{}).cuotas||[]).filter(function(g){
        return g.categoria===filtroCatVal&&(!filtroOrigenVal||g.origen===filtroOrigenVal);
      }).reduce(function(a,g){return a+g.monto;},0);
    };
    datasets.push({
      label:filtroCatVal,
      data:claves.map(function(c){ return sumaCatMes(cache[c]); }),
      borderColor:color(filtroCatVal),backgroundColor:color(filtroCatVal),tension:0.3,pointRadius:3,borderWidth:1.5,fill:false
    });
  }
  if(chart) chart.destroy();
  chart=new Chart(document.getElementById("chart").getContext("2d"),{
    type:"line",data:{labels:labels,datasets:datasets},
    options:{
      responsive:true,
      onClick: function(e, elementos){
        if(elementos&&elementos.length>0){
          var idx=elementos[0].index;
          var clave=claves[idx];
          if(clave){
            var p=clave.split("-");
            anioActual=parseInt(p[0]);
            mesActual=parseInt(p[1]);
            filtroCatVal=""; filtroOrigenVal="";
            actualizarBtns();
            cargarMes();
          }
        }
      },
      plugins:{
        legend:{position:"bottom",labels:{boxWidth:9,font:{size:11},color:"#e8edf5"}},
        tooltip:{callbacks:{
          title:function(items){ var c=claves[items[0].dataIndex]; var p=c.split("-"); return MESES[parseInt(p[1])-1]+" "+p[0]; },
          label:function(ctx){ return ctx.dataset.label+": "+fmt(ctx.parsed.y); }
        }}
      },
      scales:{
        y:{ticks:{font:{size:10},color:"#8b97ab",callback:function(v){return "$"+Math.round(v/1000).toLocaleString("es-CL")+"M";}},grid:{color:"#26324a"}},
        x:{ticks:{font:{size:10},color:"#8b97ab"},grid:{display:false}}
      }
    }
  });
  var hist=document.getElementById("resumenHist");
  if(filtroCatVal&&Object.keys(cache).length>0){
    var sumaHist=function(mc){
      return ((mc||{}).gastos||[]).concat((mc||{}).cuotas||[]).filter(function(g){
        return g.categoria===filtroCatVal&&(!filtroOrigenVal||g.origen===filtroOrigenVal);
      }).reduce(function(a,g){return a+g.monto;},0);
    };
    var totalAcum=Object.values(cache).reduce(function(a,d){ return a+sumaHist(d); },0);
    var hh="<div style='border-top:1px solid var(--line);padding-top:12px;margin-top:12px;'>";
    hh+="<div style='display:flex;justify-content:space-between;font-weight:700;font-size:13px;margin-bottom:8px;color:"+color(filtroCatVal)+"'><span>"+filtroCatVal+"</span><span>"+fmt(totalAcum)+" total</span></div>";
    claves.forEach(function(c){
      var m=sumaHist(cache[c]);
      if(!m) return;
      var p=c.split("-");
      hh+="<div class='hist-row'><span>"+MESES[parseInt(p[1])-1]+" "+p[0]+"</span><span>"+fmt(m)+"</span></div>";
    });
    hh+="</div>";
    hist.innerHTML=hh;
  } else { hist.innerHTML=""; }
}

  render();
});

document.getElementById("btnAgregar").addEventListener("click",async function(){
  var monto=parseFloat(document.getElementById("montoInput").value);
  var tipo=document.getElementById("tipoInput").value;
  var cat=document.getElementById("catInput").value;
  var origen=document.getElementById("origenInput").value;
  var comentario=document.getElementById("comentarioInput").value.trim();
  var cuotas=parseInt(document.getElementById("cuotasInput").value)||1;
  if(!monto||monto<=0){ status("Ingresa un monto válido","error"); return; }
  status("Guardando en Sheets...");
  try{
    var fechaVal=document.getElementById("fechaInput").value||new Date().toISOString().slice(0,10);
    var partesFecha=fechaVal.split("-");
    var fecha=partesFecha[2]+"/"+partesFecha[1]+"/"+partesFecha[0];
    var hoy=new Date(fechaVal+"T12:00:00");
    var sheetName={"TC Santander":"TC Santander","TC CMR":"TC CMR","TC Cencosud":"TC Cencosud"}[origen]||"Manuales";
    var res=await apiPost({
      action:"appendGasto",
      sheet:sheetName,
      fecha:fecha,
      descripcion:comentario||cat,
      titular:sheetName==="Manuales"?origen:"Titular",
      total:monto,
      cuotas:cuotas,
      concepto:cat,
      tipo:tipo,
      mesInicioIdx:mesActual-1,
      anioInicio:anioActual
    });
    if(!res.ok) throw new Error(res.error||"Error guardando");
    var signoLocal=(tipo==="abono")?-1:1;
    datosMes.gastos.unshift({monto:signoLocal*Math.round(monto/cuotas),montoTotal:monto,categoria:cat,origen:origen,comentario:comentario,fecha:hoy.toISOString(),cuotas:cuotas});
    document.getElementById("montoInput").value="";
    document.getElementById("comentarioInput").value="";
    document.getElementById("cuotasInput").value="1";
    render();
    status("✅ Guardado en "+sheetName,"ok");
  }catch(err){
    console.error(err);
    status("❌ Error: "+err.message,"error");
  }
});

document.getElementById("btnFoto").addEventListener("click",function(){ document.getElementById("fotoInput").click(); });
document.getElementById("fotoInput").addEventListener("change",async function(e){
  var file=e.target.files[0]; if(!file) return;
  var statusEl=document.getElementById("fotoStatus");
  statusEl.textContent="⏳ Analizando foto...";
  try{
    var base64=await new Promise(function(res,rej){
      var r=new FileReader(); r.onload=function(){res(r.result.split(",")[1]);}; r.onerror=function(){rej(new Error("Error leyendo"));};
      r.readAsDataURL(file);
    });
    var resp=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:400,
        messages:[{role:"user",content:[
          {type:"image",source:{type:"base64",media_type:file.type,data:base64}},
          {type:"text",text:"Analiza esta imagen. Responde SOLO JSON sin backticks: {monto:número entero,categoria:string,comentario:string breve}"}
        ]}]
      })
    });
    var data=await resp.json();
    var parsed=JSON.parse(data.content.map(function(i){return i.text||"";}).join("").replace(/```json|```/g,"").trim());
    if(parsed.monto) document.getElementById("montoInput").value=parsed.monto;
    if(parsed.categoria) document.getElementById("catInput").value=parsed.categoria;
    if(parsed.comentario) document.getElementById("comentarioInput").value=parsed.comentario;
    statusEl.textContent="✅ Datos cargados — revisa y confirma";
  }catch(err){ statusEl.textContent="❌ No pude leer la foto"; console.error(err); }
  e.target.value="";
});

// Setear fecha de hoy por defecto
var hoyFecha = new Date();
var yyyy = hoyFecha.getFullYear();
var mm = String(hoyFecha.getMonth()+1).padStart(2,"0");
var dd = String(hoyFecha.getDate()).padStart(2,"0");
document.getElementById("fechaInput").value = yyyy+"-"+mm+"-"+dd;

actualizarBtns();
// Selector inicial: preguntar qué mes/año ver antes de cargar
var inicioAnio=anioActual;
function renderInicio(){
  document.getElementById("inicioAnioNum").textContent=inicioAnio;
  var grid=document.getElementById("inicioMeses");
  grid.innerHTML="";
  MESES.forEach(function(m,i){
    var b=document.createElement("button");
    b.textContent=m.slice(0,3);
    if(inicioAnio===_hoy.getFullYear()&&i===_hoy.getMonth()) b.className="actual";
    b.onclick=function(){
      mesActual=i+1; anioActual=inicioAnio;
      actualizarBtns();
      document.getElementById("inicioOverlay").style.display="none";
      precargarTendencia().then(function(){ cargarMes(); });
    };
    grid.appendChild(b);
  });
}
document.getElementById("inicioAnioPrev").addEventListener("click",function(){ inicioAnio--; renderInicio(); });
document.getElementById("inicioAnioNext").addEventListener("click",function(){ inicioAnio++; renderInicio(); });
renderInicio();
</script>
